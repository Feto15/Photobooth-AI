<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Participant Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400;600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark"></div>
          <div class="brand-text">
            <div class="brand-title">Corporate Event</div>
            <div class="brand-subtitle">Registration</div>
          </div>
        </div>
        <div class="badge">REGISTER</div>
      </header>

      <main class="content">
        <section class="card">
          <div class="section-title">Participant Details</div>
          <form id="registerForm" class="form-grid">
            <label>
              Full Name
              <input name="name" required />
            </label>
            <label>
              Email
              <input name="email" type="email" required />
            </label>
            <label>
              Phone / WhatsApp
              <input name="phone" required />
            </label>
            <label>
              Event ID
              <input name="eventId" value="demo-event" required />
            </label>
            <button class="btn primary" type="submit">Submit & Generate QR</button>
          </form>
        </section>

        <section class="note" id="resultSection" style="display:none">
          <div class="note-title">Registration Result</div>
          <div class="note-body">
            <div class="qr-wrap">
              <img id="resultQr" alt="QR Code" />
            </div>
            <div class="note-text">
              <div>Code: <span class="mono" id="resultCode">CODE</span></div>
              <div>Landing: <a id="resultLanding" href="#" target="_blank" rel="noreferrer">Open</a></div>
              <div>Itinerary: <a id="resultItinerary" href="#" target="_blank" rel="noreferrer">Open</a></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/register.js"></script>
  </body>
</html>
